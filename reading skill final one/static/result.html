<!DOCTYPE html>
<html lang="ta">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Results</title>
    <link rel="stylesheet" href="style.css">

    <!-- External Libraries for AI Assessment Analysis -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"
        integrity="sha512-BNaRQnY9KRC8tX3fLx0o0K9w2v/YvI8p6N0sMvB4A9X4U3N0f8l5J4iX4o3X4w2vYvI8p6N0sMvB4A9X4U=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>

    <!-- Custom AI Teacher Agent -->
    <script src="../../frontend/js/teacher-agent.js"></script>

    <style>
        .ai-report-card {
            background: #ffffff;
            border-radius: 12px;
            padding: 30px;
            margin-top: 20px;
            border: 2px solid #0d6efd;
            box-shadow: 0 4px 15px rgba(13, 110, 253, 0.1);
        }

        .ai-report-content {
            line-height: 1.7;
            color: #334155;
        }

        .loading-ai {
            text-align: center;
            padding: 30px;
        }

        .spinner-ai {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #0d6efd;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body data-page="result">
    <div class="exam-header">
        <div class="exam-header-content">
            <div class="exam-title">
                <h1>தமிழ் வாசிப்பு திறன் மதிப்பீடு</h1>
                <h2>Results</h2>
            </div>
        </div>
    </div>

    <div class="exam-container">
        <div class="content-section" id="results-section">
            <div class="section-header">
                <h2>Final Score</h2>
            </div>
            <div class="results-container show" id="final-results-container">
                <div class="results-header simple">
                    <div class="result-status" id="result-status-text">--</div>
                    <div class="result-marks" id="result-marks-text">0/0</div>
                </div>
                <div style="margin-top: 10px; font-size: 1.1em;">
                    <div id="result-percentage"></div>
                </div>

                <!-- AI Teacher Analysis Section -->
                <div id="aiTeacherSection"
                    style="margin-top: 40px; text-align: center; border-top: 2px dashed rgba(13, 110, 253, 0.2); padding-top: 40px;">
                    <div style="font-size: 3rem; margin-bottom: 5px;">👨‍🏫</div>
                    <h2 style="font-size: 1.8rem; margin-bottom: 15px; color: #1a1a1a;">Detailed AI Teacher Report</h2>
                    <div id="aiReportContainer" style="text-align: left; margin-top: 20px;">
                        <div class="ai-report-card">
                            <div class="loading-ai">
                                <div class="spinner-ai"></div>
                                <p>Our Teacher Agent is reviewing your reading performance in detail...</p>
                            </div>
                        </div>
                    </div>
                </div>

                <div style="margin-top: 20px;">
                    <button class="btn-primary" onclick="restartExam()"
                        style="background: #6c757d; border-color: #6c757d;">Restart</button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        async function generateTeacherAnalysis() {
            if (window.teacherAgent) {
                window.teacherAgent.apiEndpoint = '/api/generate-report';
            }

            const container = document.getElementById('aiReportContainer');
            if (container) {
                container.style.display = 'block';
                // Wait a bit for other elements to settle
                setTimeout(async () => {
                    try {
                        const reportMarkdown = await window.teacherAgent.generateReport();
                        const renderedHTML = marked.parse(reportMarkdown);
                        container.innerHTML = `
                            <div class="ai-report-card">
                                <div class="ai-report-content">
                                    ${renderedHTML}
                                </div>
                            </div>
                        `;
                    } catch (error) {
                        container.innerHTML = `<div class="ai-report-card" style="border-color: #dc3545;"><p style="color: #dc3545;"><strong>Error:</strong> ${error.message}</p></div>`;
                    }
                }, 500);
            }
        }

        window.addEventListener('DOMContentLoaded', generateTeacherAnalysis);
    </script>
    <script src="assessment-flow.js"></script>
</body>

</html>
