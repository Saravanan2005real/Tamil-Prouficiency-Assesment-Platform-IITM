<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assessment Selection - Tamil Language Proficiency</title>
    <link rel="stylesheet" href="home-style.css">
    <link rel="stylesheet" href="selection-style.css">
</head>
<body>
    <!-- Top Header Bar -->
    <div class="top-header-bar">
        <!-- Lab Branding -->
        <a href="https://home.iitm.ac.in/anindita/lclab/" target="_blank" rel="noopener noreferrer" class="lab-branding">
            <div class="lab-logo-container">
                <div class="lab-logo">
                    <img src="lab logo.png" alt="LC Lab Logo" class="logo-image">
                </div>
                <div class="lab-info">
                    <h2 class="lab-name">Language and Cognition Laboratory</h2>
                    <p class="lab-institution-main">Indian Institute of Technology Madras</p>
                </div>
            </div>
        </a>

        <!-- Navigation Icons -->
        <div class="nav-icons">
            <a href="index.html" class="nav-icon" title="Back to Home">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
                <span class="nav-text">Home</span>
            </a>
            <a href="about.html" class="nav-icon about-icon" title="About">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <path d="M12 16v-4M12 8h.01"></path>
                </svg>
                <span class="nav-text">About</span>
            </a>
            <a href="developer.html" class="nav-icon developer-icon" title="Meet Our Team">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                    <circle cx="9" cy="7" r="4"></circle>
                    <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                    <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                </svg>
                <span class="nav-text">Team</span>
            </a>
        </div>
    </div>

    <!-- Back Button -->
    <a href="#" class="back-button" onclick="history.back(); return false;" title="Back to Previous Page">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
    </a>

    <!-- Selection Container -->
    <div class="selection-container">
        <div class="assessment-sequence">
            <div class="sequence-info">
                <p class="sequence-intro">The assessment will be conducted in the following order:</p>
                
                <div class="sequence-steps" id="sequence-steps">
                    <!-- Steps will be dynamically generated based on selected level -->
                </div>
            </div>

            <div class="start-button-container">
                <div class="button-wrapper">
                    <a href="assessment-flow.html" class="start-first-assessment-btn" id="start-assessment-btn">
                        <span class="btn-text">Start Assessment</span>
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M5 12h14M12 5l7 7-7 7"/>
                        </svg>
                    </a>
                    <p class="button-hint">Click to begin your Tamil language proficiency journey</p>
                </div>
            </div>
        </div>
    </div>

    <script src="tamil-selection.js"></script>
</body>
</html>
