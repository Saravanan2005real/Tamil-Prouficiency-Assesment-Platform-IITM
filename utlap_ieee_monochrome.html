<!DOCTYPE html>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #ffffff;
            color: #000000;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 20px;
            margin: 0;
        }

        .diagram-container {
            margin-bottom: 80px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 30px;
            text-transform: uppercase;
            text-align: center;
        }

        svg {
            display: block;
            margin: 0 auto;
        }

        .box {
            fill: #ffffff;
            stroke: #000000;
            stroke-width: 3.5;
        }

        .arrow {
            stroke: #000000;
            stroke-width: 3.5;
            fill: none;
            marker-end: url(#arrowhead);
        }

        .text {
            font-family: Arial, sans-serif;
            font-size: 13px;
            fill: #000000;
            text-anchor: middle;
            font-weight: bold;
        }

        .text-sub {
            font-family: Arial, sans-serif;
            font-size: 9.5px;
            fill: #333333;
            text-anchor: middle;
            font-weight: normal;
        }

        .text-db {
            font-family: Arial, sans-serif;
            font-size: 12px;
            fill: #000000;
            text-anchor: middle;
            font-weight: bold;
        }

        .text-db-sub {
            font-family: Arial, sans-serif;
            font-size: 9.5px;
            fill: #333333;
            text-anchor: middle;
            font-weight: normal;
        }

        .print-btn {
            background-color: #000;
            color: #fff;
            padding: 12px 24px;
            font-size: 14px;
            font-weight: bold;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 20px;
            text-transform: uppercase;
        }

        @media print {
            .print-btn { display: none; }
            body { padding: 0; }
        }
    </style>
</head>
